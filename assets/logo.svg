<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 292 72" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">AppFactory</title>
  <desc id="logo-desc">A 3D AppFactory logo with a crossbar-free A symbol.</desc>
  <defs>
    <linearGradient id="symbol-face" x1="17" y1="58" x2="64" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#37e5ff" />
      <stop offset="0.48" stop-color="#4f8dff" />
      <stop offset="1" stop-color="#9a6cff" />
    </linearGradient>
    <linearGradient id="symbol-rim" x1="24" y1="12" x2="70" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="0.42" stop-color="#7ff4ff" stop-opacity="0.82" />
      <stop offset="1" stop-color="#7f5cff" stop-opacity="0.64" />
    </linearGradient>
    <linearGradient id="app-text" x1="92" y1="18" x2="166" y2="53" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#a6f5ff" />
    </linearGradient>
    <linearGradient id="factory-text" x1="158" y1="18" x2="278" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dbeaff" />
      <stop offset="1" stop-color="#8fa4bd" />
    </linearGradient>
    <filter id="symbol-depth" x="-40%" y="-45%" width="180%" height="190%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#020711" flood-opacity="0.72" />
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#37e5ff" flood-opacity="0.42" />
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#9a6cff" flood-opacity="0.28" />
    </filter>
    <filter id="text-glow" x="-8%" y="-35%" width="116%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#37e5ff" flood-opacity="0.18" />
    </filter>
  </defs>

  <g filter="url(#symbol-depth)">
    <path
      d="M17 57 L40.8 12.9 C42.7 9.4 47.4 9.4 49.3 12.9 L73 57"
      fill="none"
      stroke="#071321"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.92"
    />
    <path
      d="M17 57 L40.8 12.9 C42.7 9.4 47.4 9.4 49.3 12.9 L73 57"
      fill="none"
      stroke="url(#symbol-face)"
      stroke-width="13.6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M21.8 56 L42.7 17.2 C43.8 15.1 46.2 15.1 47.4 17.2 L68.2 56"
      fill="none"
      stroke="url(#symbol-rim)"
      stroke-width="4.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.72"
    />
    <path
      d="M30 49 L43.9 23.9"
      fill="none"
      stroke="#ffffff"
      stroke-width="2.1"
      stroke-linecap="round"
      opacity="0.36"
    />
  </g>

  <g filter="url(#text-glow)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="780" letter-spacing="0">
    <text x="92" y="44" fill="url(#app-text)">App</text>
    <text x="144" y="44" fill="url(#factory-text)">Factory</text>
  </g>
  <text x="94" y="58" fill="#7f93aa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" font-weight="700" letter-spacing="0">HUMAN TO HUMAN</text>
</svg>
