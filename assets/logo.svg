<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 292 72" role="img" aria-labelledby="logo-title logo-desc">
  <title id="logo-title">AppFactory</title>
  <desc id="logo-desc">A 3D AppFactory logo with a crossbar-free A symbol.</desc>
  <defs>
    <linearGradient id="symbol-face" x1="17" y1="58" x2="64" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#37e5ff" />
      <stop offset="0.48" stop-color="#4f8dff" />
      <stop offset="1" stop-color="#9a6cff" />
    </linearGradient>
    <linearGradient id="symbol-rim" x1="24" y1="12" x2="70" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="0.42" stop-color="#7ff4ff" stop-opacity="0.82" />
      <stop offset="1" stop-color="#7f5cff" stop-opacity="0.64" />
    </linearGradient>
    <linearGradient id="app-text" x1="92" y1="18" x2="166" y2="53" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#a6f5ff" />
    </linearGradient>
    <linearGradient id="factory-text" x1="158" y1="18" x2="278" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dbeaff" />
      <stop offset="1" stop-color="#8fa4bd" />
    </linearGradient>
    <linearGradient id="icon-bg" x1="8" y1="8" x2="78" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10243c" />
      <stop offset="0.48" stop-color="#071321" />
      <stop offset="1" stop-color="#0b0d24" />
    </linearGradient>
    <linearGradient id="beam" x1="7" y1="33" x2="81" y2="39" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#37e5ff" stop-opacity="0" />
      <stop offset="0.18" stop-color="#37e5ff" stop-opacity="0.74" />
      <stop offset="0.54" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="0.82" stop-color="#9a6cff" stop-opacity="0.78" />
      <stop offset="1" stop-color="#9a6cff" stop-opacity="0" />
    </linearGradient>
    <filter id="icon-shadow" x="-25%" y="-30%" width="150%" height="165%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#010611" flood-opacity="0.72" />
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#37e5ff" flood-opacity="0.22" />
    </filter>
    <filter id="beam-glow" x="-30%" y="-180%" width="160%" height="460%">
      <feGaussianBlur stdDeviation="1.4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="symbol-depth" x="-40%" y="-45%" width="180%" height="190%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#020711" flood-opacity="0.72" />
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#37e5ff" flood-opacity="0.42" />
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#9a6cff" flood-opacity="0.28" />
    </filter>
    <filter id="text-glow" x="-8%" y="-35%" width="116%" height="170%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#37e5ff" flood-opacity="0.18" />
    </filter>
  </defs>
  <style>
    .h2h-connection {
      transform-origin: 44px 36px;
    }

    .connection-beam {
      animation: beam-drift 5.2s ease-in-out infinite;
      transform-origin: 44px 36px;
    }

    .beam-glow-track {
      mix-blend-mode: screen;
    }

    .human-node {
      animation: node-pulse 5.2s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .node-right {
      animation-delay: -2.6s;
    }

    @keyframes beam-drift {
      0%, 100% { opacity: 0.56; transform: translateX(-1.1px); }
      50% { opacity: 0.96; transform: translateX(1.6px); }
    }

    @keyframes node-pulse {
      0%, 100% { opacity: 0.72; transform: scale(0.96); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    @media (prefers-reduced-motion: reduce) {
      .connection-beam,
      .human-node { animation: none; }
    }
  </style>

  <g filter="url(#icon-shadow)">
    <rect x="4" y="7" width="78" height="58" rx="13" fill="url(#icon-bg)" />
    <rect x="4.7" y="7.7" width="76.6" height="56.6" rx="12.2" fill="none" stroke="#8bdfff" stroke-opacity="0.18" stroke-width="1.4" />
    <g class="h2h-connection" filter="url(#beam-glow)">
      <path d="M12 37.4 C24 31.7 34.8 33.9 44.8 36.4 C56.4 39.3 67.6 37 76.8 30.9" fill="none" stroke="#37e5ff" stroke-width="5.6" stroke-linecap="round" opacity="0.09" class="connection-beam beam-glow-track" />
      <path d="M12 37.4 C24 31.7 34.8 33.9 44.8 36.4 C56.4 39.3 67.6 37 76.8 30.9" fill="none" stroke="url(#beam)" stroke-width="1.18" stroke-linecap="round" opacity="0.86" class="connection-beam" />
      <path d="M21.2 34.4 C29.8 32.6 37.2 34.2 44.8 36.4 C53.2 38.8 61.8 37.9 69.8 33.8" fill="none" stroke="#ffffff" stroke-width="0.72" stroke-linecap="round" opacity="0.28" class="connection-beam" />
      <g class="human-node node-left" transform="translate(13.1 37.1)">
        <circle cx="0" cy="0" r="4.2" fill="none" stroke="#37e5ff" stroke-width="0.72" opacity="0.22" />
        <circle cx="0" cy="-1.05" r="1.36" fill="#eaffff" opacity="0.94" />
        <path d="M-2.25 2.15 C-1.55 0.55 1.55 0.55 2.25 2.15" fill="none" stroke="#37e5ff" stroke-width="1.05" stroke-linecap="round" opacity="0.92" />
      </g>
      <g class="human-node node-right" transform="translate(76.2 31.2)">
        <circle cx="0" cy="0" r="4.2" fill="none" stroke="#9a6cff" stroke-width="0.72" opacity="0.22" />
        <circle cx="0" cy="-1.05" r="1.28" fill="#f1eaff" opacity="0.92" />
        <path d="M-2.1 2.05 C-1.45 0.6 1.45 0.6 2.1 2.05" fill="none" stroke="#9a6cff" stroke-width="1.02" stroke-linecap="round" opacity="0.88" />
      </g>
    </g>
  </g>

  <g filter="url(#symbol-depth)">
    <path
      d="M17 57 L40.8 12.9 C42.7 9.4 47.4 9.4 49.3 12.9 L73 57"
      fill="none"
      stroke="#071321"
      stroke-width="18"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.92"
    />
    <path
      d="M17 57 L40.8 12.9 C42.7 9.4 47.4 9.4 49.3 12.9 L73 57"
      fill="none"
      stroke="url(#symbol-face)"
      stroke-width="13.6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M21.8 56 L42.7 17.2 C43.8 15.1 46.2 15.1 47.4 17.2 L68.2 56"
      fill="none"
      stroke="url(#symbol-rim)"
      stroke-width="4.2"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.72"
    />
    <path
      d="M30 49 L43.9 23.9"
      fill="none"
      stroke="#ffffff"
      stroke-width="2.1"
      stroke-linecap="round"
      opacity="0.36"
    />
  </g>

  <g filter="url(#text-glow)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="780" letter-spacing="0">
    <text x="92" y="44" fill="url(#app-text)">App</text>
    <text x="144" y="44" fill="url(#factory-text)">Factory</text>
  </g>
  <text x="94" y="58" fill="#7f93aa" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="7.5" font-weight="700" letter-spacing="0">HUMAN TO HUMAN</text>
</svg>
