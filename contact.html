<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="contact.title">Contact — AppFactory</title>
  <meta name="description" content="Contact AppFactory by email." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js"></script>
  <script src="policy.js"></script>
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="/" aria-label="AppFactory">
        <svg class="logo-mark" viewBox="0 0 48 48" role="img" aria-hidden="true">
          <defs>
            <linearGradient id="afBody" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#3b82f6" /><stop offset=".5" stop-color="#22d3ee" /><stop offset="1" stop-color="#8b5cf6" />
            </linearGradient>
            <linearGradient id="afBeam" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="#22d3ee" stop-opacity="0" /><stop offset=".5" stop-color="#d6fbff" /><stop offset="1" stop-color="#8b5cf6" stop-opacity="0" />
            </linearGradient>
            <radialGradient id="afShine" cx="0.32" cy="0.26" r="0.8">
              <stop offset="0" stop-color="#ffffff" stop-opacity=".55" /><stop offset="0.5" stop-color="#ffffff" stop-opacity="0" />
            </radialGradient>
          </defs>
          <rect x="3" y="3" width="42" height="42" rx="13" fill="url(#afBody)" />
          <rect x="3" y="3" width="42" height="42" rx="13" fill="url(#afShine)" />
          <path d="M15.5 34.5 L24 14.5 L32.5 34.5" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" />
          <line x1="10.5" y1="27.5" x2="37.5" y2="27.5" stroke="url(#afBeam)" stroke-width="2.4" stroke-linecap="round" />
          <circle cx="12" cy="27.5" r="2.5" fill="#eafdff" /><circle cx="36" cy="27.5" r="2.5" fill="#eafdff" />
        </svg>
        <span class="logo-text"><b>App</b><span class="grad">Factory</span></span>
      </a>
      <nav class="nav" aria-label="Primary">
        <ul class="nav-links">
          <li><a href="/#about" data-i18n="nav.about">About</a></li>
          <li><a href="/#philosophy" data-i18n="nav.philosophy">H2H Philosophy</a></li>
          <li><a href="/#apps" data-i18n="nav.apps">Our Apps</a></li>
          <li><a href="/#policies" data-i18n="nav.policies">Policies</a></li>
        </ul>
        <div class="lang-switch" data-lang-switch aria-label="Language"></div>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
      </nav>
    </div>
  </header>

  <main>
    <section class="section section--contact">
      <div class="container">
        <div class="contact-card">
          <span class="section-tag" data-i18n="contact.tag">Contact</span>
          <h2 class="section-title" data-i18n="contact.title">Get in touch</h2>
          <p class="section-lead lead-center" data-i18n="contact.lead"></p>
          <p class="email"><a href="mailto:appfactory.publish@gmail.com">appfactory.publish@gmail.com</a></p>
          <a class="btn btn-primary" href="mailto:appfactory.publish@gmail.com" data-i18n="contact.emailBtn">Send an email</a>
          <p class="contact-note" data-i18n="contact.note"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom footer-bottom--bare">
        <span>© <span data-year>2026</span> AppFactory. <span data-i18n="footer.rights">All rights reserved.</span></span>
        <a href="/" data-i18n="backHome">← Back to home</a>
      </div>
    </div>
  </footer>

</body>
</html>
