<!DOCTYPE html>
<html lang="en">
<head>

        <a class="back-home" href="/" data-i18n="backHome">← Back to home</a>

  <footer class="site-footer">

      <div class="footer-bottom footer-bottom--bare">
        <span>© <span data-year>2026</span> AppFactory. <span data-i18n="footer.rights">All rights reserved.</span></span>
